{% extends "base.html" %}
{% block content %}

<style>
.success-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f8fafc;
}

.success-card {
    background: white;
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    max-width: 500px;
    width: 90%;
    animation: fadeIn 0.4s ease-in-out;
}

.success-icon {
    font-size: 50px;
    margin-bottom: 20px;
    color: #22c55e;
}

.success-btn {
    margin-top: 25px;
    padding: 12px 25px;
    background: linear-gradient(to right, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

<section class="success-container">
    <div class="success-card">

        <div class="success-icon">✔</div>

        <h2>Your vote has been submitted successfully.</h2>
        <p style="color:#64748b;">
            Your vote is final and cannot be changed.
        </p>

        <a href="{% url 'home' %}">
            <button class="success-btn">Return Home</button>
        </a>

    </div>
</section>

{% endblock %}
