{% extends "base.html" %}
{% block content %}

<style>
.locked-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f8fafc;
}

.locked-card {
    background: white;
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    max-width: 500px;
    width: 90%;
    animation: fadeIn 0.4s ease-in-out;
}

.lock-icon {
    font-size: 50px;
    margin-bottom: 20px;
}

.countdown {
    font-size: 22px;
    font-weight: 600;
    margin-top: 15px;
    color: #2563eb;
}

.primary-btn {
    margin-top: 25px;
    padding: 12px 25px;
    background: linear-gradient(to right, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

<section class="locked-container">
    <div class="locked-card">

        <div class="lock-icon">🔒</div>

        <h2>Results Not Available Yet</h2>

        <p style="color:#64748b;">
            Results will be published once voting has officially closed.
        </p>

        <div class="countdown">
            Time remaining:
            <div id="timer"></div>
        </div>

        <a href="{% url 'home' %}">
            <button class="primary-btn">Return Home</button>
        </a>

    </div>
</section>

<script>
const endDate = new Date("{{ election.end_date|date:'Y-m-d H:i:s' }}").getTime();

const timer = setInterval(function() {

    const now = new Date().getTime();
    const distance = endDate - now;

    if (distance <= 0) {
        clearInterval(timer);
        document.getElementById("timer").innerHTML = "Voting has closed.";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("timer").innerHTML =
        days + "d " +
        hours + "h " +
        minutes + "m " +
        seconds + "s ";

}, 1000);
</script>

{% endblock %}
