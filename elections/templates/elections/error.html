{% extends "base.html" %}
{% block content %}

<style>
.locked-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f8fafc;
}

.locked-card {
    background: white;
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    max-width: 500px;
    width: 90%;
    animation: fadeIn 0.4s ease-in-out;
}

.lock-icon {
    font-size: 50px;
    margin-bottom: 20px;
}

.primary-btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(to right, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

<section class="locked-container">
    <div class="locked-card">

        <div class="lock-icon">🔒</div>

        <h2>Results Not Available Yet</h2>

        <p style="color:#64748b;">
            Results will be published once voting has officially closed.
        </p>

        <a href="{% url 'home' %}">
            <button class="primary-btn">Return Home</button>
        </a>

    </div>
</section>

{% endblock %}
