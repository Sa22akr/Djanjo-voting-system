{% extends "base.html" %}

{% block content %}
<section style="padding:100px 0; text-align:center;">

    <div style="
        max-width:600px;
        margin:0 auto;
        background:white;
        padding:60px 40px;
        border-radius:20px;
        box-shadow:0 20px 40px rgba(0,0,0,0.05);
    ">

        <div style="
            width:80px;
            height:80px;
            margin:0 auto 30px;
            background:#22c55e;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:40px;
            color:white;
        ">
            ✓
        </div>

        <h2 style="font-size:28px; margin-bottom:15px;">
            Your vote has already been recorded
        </h2>

        <p style="color:#6b7280; line-height:1.6; margin-bottom:30px;">
            Our system allows only one vote per authenticated user.
            Thank you for participating in this secure election.
        </p>

        <a href="{% url 'results' %}">
            <button>
                View Election Results
            </button>
        </a>

    </div>

</section>
{% endblock %}
