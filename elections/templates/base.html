<!DOCTYPE html>
<html>
<head>
    <title>Secure Voting Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
    background-color: #f5f7fb;
}

.wrapper {
    max-width: 1200px;
    margin: 0 auto;
}

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        nav .logo {
            font-size: 22px;
            font-weight: bold;
            color: #2563eb;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #1f2937;
            font-weight: 500;
        }

        nav a:hover {
            color: #2563eb;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 8%;
        }

        .hero-text {
            width: 50%;
        }

        .hero-text h1 {
            font-size: 48px;
            line-height: 1.2;
            background: linear-gradient(to right, #22c55e, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            margin-top: 20px;
            font-size: 18px;
            color: #6b7280;
        }

        .hero-image {
            width: 45%;
        }

        .hero-image img {
            width: 100%;
        }

        .container {
            width: 70%;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;


        .section {
    padding: 100px 0;
}

.section-light {
    background: white;
}

.section-grey {
    background: #f5f7fb;
}

.section-title {
    text-align: center;
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 60px;
    color: #1f2937;
}

.features-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 30px;
}

.feature-card {
    background: white;
    padding: 50px 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    text-align: center;
    transition: 0.3s;
}

.feature-card:hover {
    transform: translateY(-10px);
}

.feature-card h3 {
    font-size: 20px;
    margin-bottom: 15px;
}

.feature-card p {
    color: #6b7280;
    line-height: 1.6;
}
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">SecureVote</div>
    <div>
        {% if user.is_authenticated %}
            <a href="/">Vote</a>
            <a href="/results/">Results</a>

            <form action="/accounts/logout/" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none;border:none;color:#1f2937;font-weight:500;cursor:pointer;">
                    Logout
                </button>
            </form>
        {% else %}
            <a href="/accounts/login/">Login</a>
        {% endif %}
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
